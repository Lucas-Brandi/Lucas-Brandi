name: Metrics
on:
  # Agenda a atualização a cada 12 horas
  schedule: [{ cron: '0 */12 * * *' }]
  # Permite rodar manualmente a qualquer momento
  workflow_dispatch:
  # Roda sempre que você der um push no mestre
  push: { branches: ['master', 'main'] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Configurações de exibição
          user: Lucas-Brandi
          template: classic
          base: header, community, repositories, metadata
          config_timezone: America/Sao_Paulo

          # Ativar o bloco de linguagens
          plugin_languages: yes

          plugin_languages_details: bytes-size, percentage # Mostra detalhes

