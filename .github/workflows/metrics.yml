name: Metrics
on:
  # Atualiza a cada 24 horas
  schedule: [{ cron: '0 0 * * *' }]
  # Permite rodar manualmente a qualquer momento
  workflow_dispatch:
  push: { branches: ['master', 'main'] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Seu token configurado no Secrets do repositório
          token: ${{ secrets.METRICS_TOKEN }}

          # Remove todo o resto e deixa só o que queremos
          base: ''

          # Configurações das linguagens
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
